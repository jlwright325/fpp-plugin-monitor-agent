name: Enable auto-merge

# When label `automerge` is present, enable GitHub auto-merge (merge when required checks pass).
# Requires: branch protection + required checks + "Allow auto-merge" in repo settings.

on:
  pull_request:
    types:
      - labeled
      - opened
      - synchronize
      - reopened

concurrency:
  group: enable-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  enable:
    if: |
      github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          merge-method: squash
